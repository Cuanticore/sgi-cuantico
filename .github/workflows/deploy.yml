name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        run: |
          docker buildx build \
            --cache-from type=local,src=/home/ubuntu/docker-cache/sgi-cuantico \
            --cache-to type=local,dest=/home/ubuntu/docker-cache/sgi-cuantico,mode=max \
            --tag ghcr.io/cuanticore/sgi-cuantico:latest \
            --push \
            .

      - name: Write env file
        run: echo "${{ secrets.DEPLOY_ENV }}" > .env

      - name: Deploy container
        run: |
          docker pull ghcr.io/cuanticore/sgi-cuantico:latest

          CURRENT=$(docker ps -q --filter "label=coolify.name=xkl6pdbfpctlsilc52de07xi")
          CONTAINER_NAME=$(docker inspect "$CURRENT" --format '{{.Name}}' | tr -d '/')

          docker stop "$CURRENT"
          docker rm "$CURRENT"

          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            --network coolify \
            --network-alias "$CONTAINER_NAME" \
            --expose 3004 \
            --env-file .env \
            --label "traefik.enable=true" \
            --label "traefik.http.middlewares.gzip.compress=true" \
            --label "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https" \
            --label "traefik.http.routers.http-0-xkl6pdbfpctlsilc52de07xi.entryPoints=http" \
            --label "traefik.http.routers.http-0-xkl6pdbfpctlsilc52de07xi.middlewares=redirect-to-https" \
            --label "traefik.http.routers.http-0-xkl6pdbfpctlsilc52de07xi.rule=Host(\`sig.cuantico.com\`) && PathPrefix(\`/\`)" \
            --label "traefik.http.routers.http-0-xkl6pdbfpctlsilc52de07xi.service=http-0-xkl6pdbfpctlsilc52de07xi" \
            --label "traefik.http.routers.https-0-xkl6pdbfpctlsilc52de07xi.entryPoints=https" \
            --label "traefik.http.routers.https-0-xkl6pdbfpctlsilc52de07xi.middlewares=gzip" \
            --label "traefik.http.routers.https-0-xkl6pdbfpctlsilc52de07xi.rule=Host(\`sig.cuantico.com\`) && PathPrefix(\`/\`)" \
            --label "traefik.http.routers.https-0-xkl6pdbfpctlsilc52de07xi.service=https-0-xkl6pdbfpctlsilc52de07xi" \
            --label "traefik.http.routers.https-0-xkl6pdbfpctlsilc52de07xi.tls=true" \
            --label "traefik.http.routers.https-0-xkl6pdbfpctlsilc52de07xi.tls.certresolver=letsencrypt" \
            --label "traefik.http.services.http-0-xkl6pdbfpctlsilc52de07xi.loadbalancer.server.port=3004" \
            --label "traefik.http.services.https-0-xkl6pdbfpctlsilc52de07xi.loadbalancer.server.port=3004" \
            --label "coolify.managed=true" \
            --label "coolify.name=xkl6pdbfpctlsilc52de07xi" \
            --label "coolify.applicationId=7" \
            --label "coolify.type=application" \
            --label "coolify.resourceName=sgi-cuantico-prod" \
            ghcr.io/cuanticore/sgi-cuantico:latest
