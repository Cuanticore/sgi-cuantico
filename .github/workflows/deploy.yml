name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        run: |
          docker buildx build \
            --cache-from type=local,src=/home/ubuntu/docker-cache/sgi-cuantico \
            --cache-to type=local,dest=/home/ubuntu/docker-cache/sgi-cuantico,mode=max \
            --tag ghcr.io/cuanticore/sgi-cuantico:latest \
            --push \
            .

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ec2-98-83-132-206.compute-1.amazonaws.com
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            DOCKER_CONFIG=$(mktemp -d)
            AUTH=$(printf '%s:%s' "$GITHUB_ACTOR" "$GITHUB_TOKEN" | base64 -w 0)
            printf '{"auths":{"ghcr.io":{"auth":"%s"}}}' "$AUTH" > "$DOCKER_CONFIG/config.json"
            cd /data/coolify/applications/xkl6pdbfpctlsilc52de07xi
            DOCKER_CONFIG="$DOCKER_CONFIG" docker compose pull
            docker compose up -d --force-recreate --remove-orphans
            rm -rf "$DOCKER_CONFIG"
