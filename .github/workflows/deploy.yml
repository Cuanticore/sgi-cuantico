name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, push and reload container
        run: |
          docker buildx build \
            --cache-from type=local,src=/home/ubuntu/docker-cache/sgi-cuantico \
            --cache-to type=local,dest=/home/ubuntu/docker-cache/sgi-cuantico,mode=max \
            --tag ghcr.io/cuanticore/sgi-cuantico:latest \
            --push --load \
            .
          curl -s "https://automatizaciones.cuantico.com/api/v1/deploy?uuid=xkl6pdbfpctlsilc52de07xi&force=true" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" || true
