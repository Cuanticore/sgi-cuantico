name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        run: |
          docker buildx build \
            --cache-from type=local,src=/home/ubuntu/docker-cache/sgi-cuantico \
            --cache-to type=local,dest=/home/ubuntu/docker-cache/sgi-cuantico,mode=max \
            --tag ghcr.io/cuanticore/sgi-cuantico:latest \
            --push \
            .

      - name: Deploy via Coolify compose
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@localhost \
            "cd /data/coolify/applications/xkl6pdbfpctlsilc52de07xi && docker compose pull && docker compose up -d --force-recreate"
          rm -f /tmp/deploy_key
