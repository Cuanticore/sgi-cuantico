name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/cuanticore/sgi-cuantico:latest
          cache-from: type=local,src=/home/ubuntu/docker-cache/sgi-cuantico
          cache-to: type=local,dest=/home/ubuntu/docker-cache/sgi-cuantico,mode=max

      - name: Trigger Coolify deploy
        run: |
          curl -s --resolve automatizaciones.cuantico.com:443:98.83.132.206 \
            "https://automatizaciones.cuantico.com/api/v1/deploy?uuid=j5xsvy58kdohun5rkdaxa4tk&force=true" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
